name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install ropm modules
        run: npx ropm install

      - name: Validate (bsc type-check)
        run: npm run validate

      - name: Lint (bslint)
        run: npm run lint
