name: Generate Docs

on:
  push:
    branches: [main]

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.DOCS_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Install ropm modules
        run: npx ropm install

      - name: Generate docs
        run: npm run docs

      - name: Open/update docs PR
        env:
          GH_TOKEN: ${{ secrets.DOCS_PAT }}
        run: |
          if git diff --quiet -- docs; then
            echo "No doc changes"
            exit 0
          fi

          BRANCH="automated/docs-update"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git switch -C "$BRANCH"
          git add docs
          git commit -m "Update generated docs"
          git push --force origin "$BRANCH"

          PR_NUMBER=$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number')
          if [ -z "$PR_NUMBER" ]; then
            gh pr create --head "$BRANCH" --base main \
              --title "Update generated docs" \
              --body "Automated docs regeneration from the latest push to main. Review and merge when ready."
          else
            echo "PR #$PR_NUMBER already open, pushed new commit to it."
          fi
