<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>
  <style>
    .axis { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arrow4); }
    .label { font-size: 13px; fill: #222; }
    .small { font-size: 11.5px; fill: #555; }
    .title { font-size: 15px; font-weight: 700; fill: #111; }
    .code { font-family: "JetBrains Mono", monospace; font-size: 12px; fill: #333; }
    .dot { fill: #6446c8; }
  </style>

  <text x="220" y="30" text-anchor="middle" class="title">World space (GameEntity.position)</text>
  <line x1="60" y1="220" x2="60" y2="80" class="axis"/>
  <line x1="60" y1="220" x2="380" y2="220" class="axis"/>
  <text x="70" y="90" class="label">+y (up)</text>
  <text x="350" y="240" class="label">+x</text>
  <circle cx="150" cy="150" r="5" class="dot"/>
  <text x="160" y="145" class="label">entity.position</text>
  <text x="220" y="270" text-anchor="middle" class="small">input.y: "up" = +1, "down" = -1 (standard math convention)</text>
  <text x="220" y="288" text-anchor="middle" class="small">velocity.y follows the same convention, in units/second</text>

  <path d="M 420 150 L 500 150" class="axis"/>
  <text x="460" y="135" text-anchor="middle" class="small">Camera</text>

  <text x="680" y="30" text-anchor="middle" class="title">Canvas / raster space (pixels)</text>
  <line x1="540" y1="80" x2="540" y2="220" class="axis"/>
  <line x1="540" y1="80" x2="860" y2="80" class="axis"/>
  <text x="550" y="95" class="label">+x</text>
  <text x="500" y="215" class="label">+y (down)</text>
  <circle cx="630" cy="140" r="5" class="dot"/>
  <text x="640" y="135" class="label">raster point</text>

  <text x="450" y="320" text-anchor="middle" class="code">Camera2d.worldPointToCanvasPoint(pWorld)</text>
  <text x="450" y="340" text-anchor="middle" class="small">flips y (pNDC.y = -pScreen.y + canvasHeight * 0.5) - this is the ONLY place</text>
  <text x="450" y="356" text-anchor="middle" class="small">the y-flip happens. Anything that draws without going through it must already be in raster space.</text>
</svg>
