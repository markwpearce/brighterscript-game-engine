<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; rx: 6; }
    .boxAlt { fill: #fdf2f2; stroke: #a33; stroke-width: 1.5; rx: 6; }
    .title { font-size: 14px; font-weight: 700; fill: #111; }
    .label { font-size: 12px; fill: #333; }
    .small { font-size: 11px; fill: #555; }
    line { stroke: #555; stroke-width: 1.5; marker-end: url(#arrow5); }
  </style>

  <rect x="40" y="40" width="220" height="60" class="box"/>
  <text x="150" y="65" text-anchor="middle" class="title">entity.position</text>
  <text x="150" y="85" text-anchor="middle" class="small">world space</text>

  <line x1="260" y1="60" x2="380" y2="60"/>
  <rect x="380" y="30" width="230" height="60" class="box"/>
  <text x="495" y="55" text-anchor="middle" class="title">Drawable.addToScene()</text>
  <text x="495" y="75" text-anchor="middle" class="small">→ SceneObject → Renderer</text>

  <line x1="610" y1="60" x2="720" y2="60"/>
  <rect x="720" y="30" width="150" height="60" class="box"/>
  <text x="795" y="55" text-anchor="middle" class="title">Camera</text>
  <text x="795" y="75" text-anchor="middle" class="small">worldPointToCanvasPoint()</text>

  <line x1="260" y1="80" x2="380" y2="220"/>
  <rect x="380" y="190" width="230" height="60" class="boxAlt"/>
  <text x="495" y="215" text-anchor="middle" class="title">Collider.setupCompositor()</text>
  <text x="495" y="235" text-anchor="middle" class="small">roCompositor sprite at RAW position.x/y</text>

  <line x1="610" y1="220" x2="720" y2="220"/>
  <rect x="720" y="190" width="150" height="60" class="boxAlt"/>
  <text x="795" y="215" text-anchor="middle" class="title">no camera</text>
  <text x="795" y="235" text-anchor="middle" class="small">bypassed entirely</text>

  <text x="450" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#7a1f1f">
    Colliders never go through the Camera - only Drawables do.
  </text>
  <text x="450" y="320" text-anchor="middle" class="small">Any custom draw code (bypassing a Drawable, e.g. direct DrawRectangle calls) must stay in the SAME raw/raster space colliders use, or the two will drift apart - see the `examples/snake` case study.</text>
</svg>
