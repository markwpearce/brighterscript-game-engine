<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; rx: 6; }
    .boxAlt { fill: #f3f4f6; stroke: #333; stroke-width: 1.5; rx: 6; }
    .title { font-size: 15px; font-weight: 700; fill: #111; }
    .label { font-size: 12.5px; fill: #333; }
    .small { font-size: 11px; fill: #555; }
    .grp { fill: none; stroke: #999; stroke-width: 1; stroke-dasharray: 4 3; rx: 8; }
    .grpTitle { font-size: 11px; fill: #777; font-style: italic; }
    line, path.arrow { stroke: #555; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
  </style>

  <!-- Game -->
  <rect x="380" y="16" width="220" height="46" class="box"/>
  <text x="490" y="38" text-anchor="middle" class="title">Game</text>
  <text x="490" y="54" text-anchor="middle" class="small">main loop, Play()</text>

  <!-- Entities group -->
  <rect x="60" y="100" width="500" height="160" class="grp"/>
  <text x="72" y="94" class="grpTitle">every frame, for the current Room then each entity in sortedEntities</text>

  <rect x="80" y="120" width="150" height="50" class="boxAlt"/>
  <text x="155" y="141" text-anchor="middle" class="label" font-weight="700">Room</text>
  <text x="155" y="157" text-anchor="middle" class="small">extends GameEntity</text>

  <rect x="260" y="120" width="150" height="50" class="boxAlt"/>
  <text x="335" y="141" text-anchor="middle" class="label" font-weight="700">GameEntity</text>
  <text x="335" y="157" text-anchor="middle" class="small">position, velocity, rotation</text>

  <rect x="440" y="120" width="100" height="50" class="boxAlt"/>
  <text x="490" y="141" text-anchor="middle" class="label" font-weight="700">GameEntity</text>
  <text x="490" y="157" text-anchor="middle" class="small">(more…)</text>

  <rect x="140" y="200" width="150" height="40" class="box"/>
  <text x="215" y="224" text-anchor="middle" class="label">drawables[]</text>

  <rect x="310" y="200" width="150" height="40" class="box"/>
  <text x="385" y="224" text-anchor="middle" class="label">colliders{}</text>

  <line x1="335" y1="170" x2="215" y2="200"/>
  <line x1="335" y1="170" x2="385" y2="200"/>

  <!-- Renderer / Canvas pipeline -->
  <rect x="60" y="300" width="290" height="50" class="boxAlt"/>
  <text x="205" y="321" text-anchor="middle" class="label" font-weight="700">Renderer (game canvas)</text>
  <text x="205" y="337" text-anchor="middle" class="small">SceneObjects, Camera, TriangleCache</text>

  <rect x="60" y="380" width="290" height="44" class="box"/>
  <text x="205" y="407" text-anchor="middle" class="label">Canvas</text>

  <line x1="215" y1="240" x2="205" y2="300"/>
  <line x1="205" y1="350" x2="205" y2="380"/>

  <!-- Collision pipeline -->
  <rect x="380" y="300" width="180" height="50" class="boxAlt"/>
  <text x="470" y="321" text-anchor="middle" class="label" font-weight="700">roCompositor</text>
  <text x="470" y="337" text-anchor="middle" class="small">CheckMultipleCollisions()</text>

  <rect x="380" y="380" width="180" height="44" class="box"/>
  <text x="470" y="407" text-anchor="middle" class="label">onCollision()</text>

  <line x1="385" y1="240" x2="470" y2="300"/>
  <line x1="470" y1="350" x2="470" y2="380"/>

  <!-- UI pipeline -->
  <rect x="640" y="120" width="280" height="50" class="boxAlt"/>
  <text x="780" y="141" text-anchor="middle" class="label" font-weight="700">gameUi / debugUi</text>
  <text x="780" y="157" text-anchor="middle" class="small">UiContainer tree of UiWidgets</text>

  <rect x="640" y="300" width="280" height="50" class="boxAlt"/>
  <text x="780" y="321" text-anchor="middle" class="label" font-weight="700">Renderer (UI canvas)</text>

  <rect x="640" y="380" width="280" height="44" class="box"/>
  <text x="780" y="407" text-anchor="middle" class="label">uiCanvas</text>

  <line x1="780" y1="170" x2="780" y2="300"/>
  <line x1="780" y1="350" x2="780" y2="380"/>

  <!-- Screen -->
  <rect x="330" y="470" width="320" height="50" class="box"/>
  <text x="490" y="491" text-anchor="middle" class="label" font-weight="700">roScreen</text>
  <text x="490" y="507" text-anchor="middle" class="small">game canvas + UI canvas composited, then swapped</text>

  <line x1="205" y1="424" x2="440" y2="470"/>
  <line x1="470" y1="424" x2="490" y2="470"/>
  <line x1="780" y1="424" x2="540" y2="470"/>

  <line x1="490" y1="62" x2="335" y2="100" marker-end="url(#arrow)"/>
  <line x1="490" y1="62" x2="780" y2="120" marker-end="url(#arrow)"/>

  <text x="490" y="580" text-anchor="middle" class="small">Drawable.addToScene(renderer) registers a SceneObject; the Drawable itself never draws directly.</text>
  <text x="490" y="598" text-anchor="middle" class="small">Colliders wrap a roSprite region on the shared roCompositor, independent of the Renderer/Camera.</text>
</svg>
