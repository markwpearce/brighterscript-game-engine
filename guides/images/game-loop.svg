<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>
  <style>
    .step { fill: #fff; stroke: #333; stroke-width: 1.5; rx: 8; }
    .num { font-size: 20px; font-weight: 800; fill: #6446c8; }
    .title { font-size: 15px; font-weight: 700; fill: #111; }
    .label { font-size: 12px; fill: #333; }
    path.arrow { stroke: #555; stroke-width: 1.5; fill: none; marker-end: url(#arrow2); }
  </style>

  <!-- 1. Input -->
  <rect x="40" y="40" width="220" height="88" class="step"/>
  <text x="58" y="72" class="num">1</text>
  <text x="85" y="72" class="title">Input / Events</text>
  <text x="58" y="94" class="label">Remote, ECP, audio,</text>
  <text x="58" y="110" class="label">URL transfer events</text>

  <!-- 2. Update -->
  <rect x="350" y="40" width="220" height="88" class="step"/>
  <text x="368" y="72" class="num">2</text>
  <text x="395" y="72" class="title">Update</text>
  <text x="368" y="94" class="label">onUpdate(), then apply</text>
  <text x="368" y="110" class="label">velocity to position</text>

  <!-- 3. Collisions -->
  <rect x="660" y="40" width="220" height="88" class="step"/>
  <text x="678" y="72" class="num">3</text>
  <text x="705" y="72" class="title">Collisions</text>
  <text x="678" y="94" class="label">Compositor check per</text>
  <text x="678" y="110" class="label">Collider, onCollision()</text>

  <!-- 4. Draw -->
  <rect x="660" y="200" width="220" height="88" class="step"/>
  <text x="678" y="232" class="num">4</text>
  <text x="705" y="232" class="title">Draw</text>
  <text x="678" y="254" class="label">onDrawBegin/End around</text>
  <text x="678" y="270" class="label">Renderer.drawScene()</text>

  <!-- 5. UI -->
  <rect x="350" y="200" width="220" height="88" class="step"/>
  <text x="368" y="232" class="num">5</text>
  <text x="395" y="232" class="title">UI / Debug UI</text>
  <text x="368" y="254" class="label">gameUi and debugUi update</text>
  <text x="368" y="270" class="label">+ draw on uiCanvas</text>

  <!-- 6. Swap -->
  <rect x="40" y="200" width="220" height="88" class="step"/>
  <text x="58" y="232" class="num">6</text>
  <text x="85" y="232" class="title">Swap &amp; Housekeeping</text>
  <text x="58" y="254" class="label">Swap buffers, periodic GC,</text>
  <text x="58" y="270" class="label">apply pending room change</text>

  <!-- Arrows around the cycle -->
  <path class="arrow" d="M 260 84 L 350 84"/>
  <path class="arrow" d="M 570 84 L 660 84"/>
  <path class="arrow" d="M 770 128 L 770 200"/>
  <path class="arrow" d="M 660 244 L 570 244"/>
  <path class="arrow" d="M 350 244 L 260 244"/>
  <path class="arrow" d="M 150 200 L 150 128"/>

  <text x="460" y="340" text-anchor="middle" font-size="13" fill="#333">Every step re-checks isValidEntity() before each callback -</text>
  <text x="460" y="360" text-anchor="middle" font-size="13" fill="#333">a callback may Delete() the entity or trigger a room change mid-frame.</text>

  <text x="460" y="410" text-anchor="middle" font-size="12" fill="#666">Entity order: current Room first/last, then sortedEntities in zIndex (insertion) order.</text>
</svg>
