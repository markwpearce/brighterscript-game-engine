<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c0392b"/>
    </marker>
  </defs>
  <style>
    .rect { fill: #eef2ff; stroke: #333; stroke-width: 1.5; }
    .pos { fill: #c0392b; }
    .dim { stroke: #c0392b; stroke-width: 1.5; fill: none; marker-end: url(#arrow3); }
    .label { font-size: 13px; fill: #222; }
    .small { font-size: 11.5px; fill: #555; }
    .code { font-family: "JetBrains Mono", monospace; font-size: 12px; fill: #333; }
  </style>

  <!-- LEFT: top-left-anchored drawing (Paddle/Brick style) -->
  <text x="230" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#111">Top-left-anchored draw (e.g. Paddle, Brick)</text>

  <rect x="130" y="60" width="200" height="140" class="rect"/>
  <circle cx="130" cy="60" r="5" class="pos"/>
  <text x="140" y="52" class="label">position</text>

  <line x1="130" y1="60" x2="130" y2="200" class="dim" transform="translate(-14,0)"/>
  <text x="98" y="135" class="small" transform="rotate(-90 98 135)">height</text>

  <text x="230" y="260" text-anchor="middle" class="code">addRectangleCollider(name, w, h, 0, h)</text>
  <text x="230" y="280" text-anchor="middle" class="small">offset_y = height, so offset.y (bottom) lands at</text>
  <text x="230" y="296" text-anchor="middle" class="small">position.y + height - matching the drawn box.</text>

  <!-- RIGHT: centered drawing (Ball style) -->
  <text x="670" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#111">Centered draw (e.g. Ball)</text>

  <rect x="570" y="90" width="200" height="140" class="rect"/>
  <circle cx="670" cy="160" r="5" class="pos"/>
  <text x="680" y="152" class="label">position</text>

  <text x="670" y="260" text-anchor="middle" class="code">addRectangleCollider(name, w, h, -w/2, h/2)</text>
  <text x="670" y="280" text-anchor="middle" class="small">offset_y = height/2 centers the box on position,</text>
  <text x="670" y="296" text-anchor="middle" class="small">matching a centered drawRectangle/drawImage call.</text>

  <text x="450" y="335" text-anchor="middle" font-size="13" fill="#7a1f1f" font-weight="700">
    RectangleCollider's top-left is always (offset.x, offset.y − height) - offset.y is the BOTTOM edge, not the top-left.
  </text>
  <text x="450" y="356" text-anchor="middle" class="small">Matching offset_y to how the entity is actually drawn is the #1 source of "collider doesn't line up with the sprite" bugs.</text>
</svg>
